<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#3B2A1A">
<title>호인플로링 견적서</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F0E8;--surface:#FDFAF6;--border:#DDD0BC;
  --accent:#3B2A1A;--accent2:#6B4C2A;--accent-lt:#F0E8D8;
  --gold:#C8922A;--gold-lt:#FDF3E0;
  --text:#1E1610;--muted:#8C7B6B;--danger:#C0392B;--radius:10px;
  --font:'Pretendard','Apple SD Gothic Neo',sans-serif;
}
body{background:var(--bg);font-family:var(--font);color:var(--text);font-size:14px;line-height:1.5}

.app-header{
  background:linear-gradient(135deg,#2C1A0E 0%,#3B2A1A 60%,#4A3320 100%);
  padding:14px 18px;display:flex;align-items:center;gap:14px;
  position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.35);
}
.header-logo{width:56px;height:56px;object-fit:contain;flex-shrink:0;filter:drop-shadow(0 2px 4px rgba(0,0,0,.4))}
.header-info{flex:1}
.brand-name{font-size:20px;font-weight:800;color:#FDFAF6;letter-spacing:-0.5px;line-height:1.1}
.brand-sub{font-size:10px;color:#C8A87A;margin-top:2px;letter-spacing:.05em;font-weight:400}
.header-contacts{display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.header-tel{font-size:12px;color:var(--gold);font-weight:700;white-space:nowrap}
.header-mobile{font-size:11px;color:#C8A87A;white-space:nowrap;font-weight:400}

.tab-bar{display:flex;background:var(--surface);border-bottom:2px solid var(--border);padding:0 16px}
.tab-btn{flex:1;padding:12px 0;font-size:14px;font-weight:600;background:none;border:none;border-bottom:3px solid transparent;color:var(--muted);cursor:pointer;transition:all .2s;margin-bottom:-2px;font-family:var(--font)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--gold)}

.content{padding:16px;max-width:640px;margin:0 auto}
.section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(59,42,26,.06)}
.section-label{font-size:11px;font-weight:700;color:var(--accent2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px;padding-bottom:8px;border-bottom:1.5px solid var(--accent-lt);display:flex;align-items:center;gap:6px}
.section-label::before{content:'';display:inline-block;width:3px;height:13px;background:var(--gold);border-radius:2px}

.field{margin-bottom:12px}
.field label{display:block;font-size:12px;color:var(--muted);font-weight:600;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;border:1px solid var(--border);border-radius:7px;padding:9px 12px;font-size:14px;color:var(--text);background:var(--surface);outline:none;transition:border-color .15s;font-family:var(--font)}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(200,146,42,.12)}
.field textarea{resize:vertical;min-height:56px;line-height:1.6}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.items-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.items-table{width:100%;border-collapse:collapse;min-width:480px}
.items-table th{background:var(--accent);color:#FDFAF6;font-size:11px;font-weight:700;padding:8px 5px;text-align:center;white-space:nowrap;font-family:var(--font)}
.items-table th:first-child{border-radius:6px 0 0 0}
.items-table th:last-child{border-radius:0 6px 0 0}
.items-table td{border-bottom:1px solid var(--border);padding:3px 3px;vertical-align:middle}
.items-table tr:nth-child(even) td{background:#FAF6EF}
.items-table input{border:none;background:transparent;width:100%;font-size:13px;padding:4px 5px;color:var(--text);text-align:inherit;font-family:var(--font);outline:none;border-radius:4px}
.items-table input:focus{background:var(--gold-lt)}
.items-table .num{text-align:right}
.name-cell{display:flex;flex-direction:column;gap:1px}
.name-cell input.brand-inp{font-size:11px;color:var(--muted);padding:2px 5px}
.spec-cell{display:flex;align-items:center;gap:2px;white-space:nowrap}
.spec-cell input{width:36px!important;text-align:center;padding:4px 2px!important}
.spec-cell input.spec-first{width:46px!important}
.spec-sep{font-size:11px;color:var(--muted);flex-shrink:0;font-weight:600}
.amt-td{font-weight:700;color:var(--accent2);text-align:right;font-size:13px;padding:0 6px!important;white-space:nowrap}
.del-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;padding:3px 6px;border-radius:4px}
.del-btn:hover{color:var(--danger);background:#FEF0EE}
.add-item-btn{width:100%;margin-top:10px;padding:9px;border:1.5px dashed var(--border);border-radius:7px;background:none;color:var(--muted);font-size:13px;cursor:pointer;font-family:var(--font);transition:.15s;font-weight:500}
.add-item-btn:hover{border-color:var(--gold);color:var(--gold);background:var(--gold-lt)}

.extra-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.extra-row input{flex:1;border:1px solid var(--border);border-radius:7px;padding:8px 10px;font-size:13px;font-family:var(--font);outline:none;background:var(--surface)}
.extra-row input:focus{border-color:var(--gold)}
.extra-row .ex-amt{width:110px;text-align:right}
.extra-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;padding:4px 6px}
.add-extra-btn{font-size:12px;color:var(--accent2);background:none;border:none;cursor:pointer;padding:2px 0;font-family:var(--font);font-weight:600}

.totals{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:14px;box-shadow:0 1px 4px rgba(59,42,26,.06)}
.total-row{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:1px solid var(--border)}
.total-row:last-child{border-bottom:none}
.total-row.main-total{background:var(--accent)}
.total-row.gold-row{background:#2A1800}
.total-label{font-size:13px;color:var(--muted);font-weight:500}
.total-row.main-total .total-label,.total-row.gold-row .total-label{color:rgba(253,250,246,.65);font-weight:600}
.total-value{font-size:15px;font-weight:700;color:var(--text)}
.total-row.main-total .total-value{color:#FDFAF6;font-size:18px;font-weight:800}
.total-row.gold-row .total-value{color:var(--gold);font-size:18px;font-weight:800}

.cond-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--accent-lt);font-size:13px;flex-wrap:wrap}
.cond-row:last-child{border-bottom:none;color:var(--accent);font-weight:700}
.cond-num{color:var(--gold);font-weight:800;min-width:18px;flex-shrink:0}
.cond-row select{border:1px solid var(--border);border-radius:5px;padding:4px 8px;font-size:13px;color:var(--text);background:var(--surface);font-family:var(--font);outline:none}

.btn-group{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.dl-btn{width:100%;padding:15px;background:var(--accent);color:#FDFAF6;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;font-family:var(--font);transition:.15s;letter-spacing:-.3px}
.dl-btn:hover{background:#2C1A0E}
.dl-btn:active{transform:scale(.98)}
.dl-btn.secondary{background:var(--accent-lt);color:var(--accent);border:1.5px solid var(--accent2)}
.dl-btn.secondary:hover{background:#E5D9C4}
.dl-btn.gold{background:linear-gradient(135deg,#C8922A,#E0A830);color:#fff;box-shadow:0 2px 8px rgba(200,146,42,.3)}
.dl-btn.gold:hover{background:linear-gradient(135deg,#B07820,#C8922A)}
.dl-btn.full{grid-column:1/-1}

.loading{position:fixed;inset:0;background:rgba(44,26,14,.88);display:none;align-items:center;justify-content:center;z-index:9998;flex-direction:column;gap:16px}
.loading.show{display:flex}
.loading-spinner{width:44px;height:44px;border:4px solid rgba(255,255,255,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
.loading-text{color:#FDFAF6;font-size:14px;font-weight:600;font-family:var(--font)}
@keyframes spin{to{transform:rotate(360deg)}}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--accent);color:#FDFAF6;padding:12px 24px;border-radius:30px;font-size:14px;font-weight:600;pointer-events:none;transition:transform .3s ease;z-index:9999;white-space:nowrap;font-family:var(--font)}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ══ PDF 레이아웃 ══ */
#pdfView{display:none}

.pdf-wrap{
  width:794px;background:#FDFAF6;padding:36px 44px 40px;
  font-family:'Pretendard','Apple SD Gothic Neo',sans-serif;
  font-size:10pt;color:#1E1610;
}
.pdf-header{
  background:linear-gradient(135deg,#2C1A0E 0%,#3B2A1A 60%,#4A3320 100%);
  display:flex;align-items:center;gap:16px;
  padding:16px 22px;border-radius:10px 10px 0 0;
}
.pdf-header-logo{width:64px;height:64px;object-fit:contain;filter:drop-shadow(0 2px 6px rgba(0,0,0,.4))}
.pdf-header-brand{flex:1}
.pdf-header-brand .bname{font-size:22pt;font-weight:800;color:#FDFAF6;letter-spacing:-0.5px;line-height:1.1}
.pdf-header-brand .bsub{font-size:9pt;color:#C8A87A;margin-top:3px;letter-spacing:.05em;font-weight:400}
.pdf-header-contacts{display:flex;flex-direction:column;align-items:flex-end;gap:5px}
.pdf-header-contacts .tel{font-size:11pt;color:#C8922A;font-weight:700}
.pdf-header-contacts .mobile{font-size:9.5pt;color:#C8A87A;font-weight:400}
.pdf-gold-bar{height:4px;background:linear-gradient(90deg,#C8922A,#E8B84B,#C8922A);margin-bottom:20px}
.pdf-doc-title{font-size:26pt;font-weight:900;color:#3B2A1A;text-align:center;letter-spacing:-1.5px;padding:10px 0 14px;border-bottom:1.5px solid #DDD0BC;margin-bottom:16px}

.pdf-info-table{width:100%;border-collapse:collapse;margin-bottom:14px;font-size:9.5pt}
.pdf-info-table td{padding:6px 10px;border:0.5px solid #DDD0BC;vertical-align:middle}
.pdf-info-table .lbl{background:#F0E8D8;color:#6B4C2A;font-weight:700;width:12%;text-align:center;white-space:nowrap}

.pdf-total-hero{display:flex;align-items:center;margin-bottom:8px;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(59,42,26,.15)}
.pdf-total-hero .lbl{background:linear-gradient(135deg,#2C1A0E,#3B2A1A);color:#C8A87A;font-weight:700;font-size:11pt;padding:14px 20px;white-space:nowrap}
.pdf-total-hero .val{flex:1;text-align:right;font-size:22pt;font-weight:900;color:#3B2A1A;padding:14px 20px;background:#F0E8D8;letter-spacing:-1px}
.pdf-hangul{font-size:8.5pt;color:#8C7B6B;text-align:right;margin-bottom:16px;padding-right:4px}

.pdf-items{width:100%;border-collapse:collapse;margin-bottom:4px;font-size:9pt}
.pdf-items th{background:#3B2A1A;color:#FDFAF6;padding:7px 8px;text-align:center;font-weight:700}
.pdf-items td{border:0.5px solid #DDD0BC;padding:6px 8px;vertical-align:middle}
.pdf-items tr:nth-child(even) td{background:#FAF6EF}
.pdf-items .r{text-align:right}
.pdf-items .c{text-align:center}
.pdf-items .brand-txt{font-size:8pt;color:#8C7B6B;display:block;margin-top:1px;font-weight:400}
.pdf-items .amt-cell{font-weight:700;color:#6B4C2A;text-align:right}

.pdf-subtotals{width:100%;border-collapse:collapse;margin-bottom:16px;font-size:9pt}
.pdf-subtotals td{padding:5px 10px;border:0.5px solid #DDD0BC}
.pdf-subtotals .lbl{background:#F5F0E8;color:#8C7B6B;text-align:right;width:82%;font-weight:500}
.pdf-subtotals .val{text-align:right;font-weight:700;white-space:nowrap}
.pdf-subtotals tr.grand td{background:#3B2A1A;color:#FDFAF6;font-weight:800;font-size:11pt}
.pdf-subtotals tr.gold td{background:#2A1800;color:#C8922A;font-weight:800;font-size:11pt}

.pdf-note{font-size:8.5pt;color:#8C7B6B;margin-bottom:16px;padding:8px 12px;border-left:3px solid #C8922A;background:#FAF6EF;border-radius:0 4px 4px 0;font-weight:400;white-space:pre-line}

.pdf-cond-box{border:1px solid #DDD0BC;border-radius:8px;overflow:hidden;margin-bottom:20px}
.pdf-cond-header{background:linear-gradient(135deg,#2C1A0E,#3B2A1A);color:#C8A87A;font-weight:700;font-size:10pt;padding:8px 14px}
.pdf-cond-row{padding:7px 14px;font-size:9pt;border-bottom:0.5px solid #EDE0CC;display:flex;gap:8px;align-items:center}
.pdf-cond-row:last-child{border-bottom:none;background:#F0E8D8;color:#3B2A1A;font-weight:700}
.pdf-cond-row .cn{color:#C8922A;font-weight:800;min-width:18px;flex-shrink:0}

.pdf-sign{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.pdf-sign-box{border:0.5px solid #DDD0BC;border-radius:8px;padding:12px 16px;min-height:100px;background:#FDFAF6}
.pdf-sign-box .sign-title{font-size:10pt;font-weight:800;color:#3B2A1A;border-bottom:2px solid #C8922A;padding-bottom:6px;margin-bottom:10px;letter-spacing:-.3px}
.pdf-sign-box .sign-row{font-size:8.5pt;color:#1E1610;padding:2px 0;display:flex;gap:8px;font-weight:400}
.pdf-sign-box .sign-row .sk{color:#8C7B6B;min-width:52px;flex-shrink:0;font-weight:600}

@media print{
  body{background:#fff!important}
  .app-header,.tab-bar,.content,.toast,.loading{display:none!important}
  #pdfView{display:block!important}
  .pdf-wrap{width:100%;padding:8mm 10mm}
  @page{size:A4;margin:0}
}

.hangul-box{background:var(--gold-lt);border:1px solid #E8C878;border-radius:8px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:flex-start;gap:10px}
.total-row.sub-row{padding:6px 16px;background:#FAFAF8}
.total-row.sub-row .total-label{font-size:12px;color:var(--muted)}
.total-row.sub-row .sub-val{font-size:13px;color:var(--accent2);font-weight:600}
.total-row.mid-total{background:var(--accent-lt)}
.total-row.mid-total .total-label{color:var(--accent2);font-weight:700;font-size:13px}
.total-row.mid-total .total-value{color:var(--accent);font-size:15px;font-weight:700}
.hangul-box .hl{font-size:11px;font-weight:700;color:var(--gold);white-space:nowrap;padding-top:1px}
.hangul-box .hv{font-size:13px;color:var(--accent);font-weight:600;line-height:1.5;word-break:keep-all}
</style>
</head>

function toHangul(n){
  if(!n||n===0) return '';
  const units=['','일','이','삼','사','오','육','칠','팔','구'];
  const pos=['','십','백','천'];
  const big=['','만','억','조'];
  let result='';
  let num=Math.round(n);
  let bigIdx=0;
  while(num>0){
    let chunk=num%10000;
    if(chunk>0){
      let chunkStr='';
      let tmp=chunk;
      for(let i=3;i>=0;i--){
        let d=Math.floor(tmp/Math.pow(10,i))%10;
        if(d>0){
          chunkStr+=(d===1&&i>0?'':units[d])+pos[i];
        }
      }
      result=chunkStr+big[bigIdx]+result;
    }
    num=Math.floor(num/10000);
    bigIdx++;
  }
  return '일금 '+result+'원정';
}

function fmt(n){return Math.round(n||0).toLocaleString('ko-KR');}
function num(id){return parseFloat(document.getElementById(id)?.value||0)||0;}
function val(id){return(document.getElementById(id)?.value||'').trim();}

(function(){
  const t=new Date().toISOString().split('T')[0];
  document.getElementById('docDate').value=t;
  const w=new Date();w.setDate(w.getDate()+7);
  document.getElementById('workDate').value=w.toISOString().split('T')[0];
})();

function switchTab(tab){
  document.getElementById('tabInput').style.display=tab==='input'?'':'none';
  document.getElementById('tabPreview').style.display=tab==='preview'?'':'none';
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    b.classList.toggle('active',(i===0&&tab==='input')||(i===1&&tab==='preview'));
  });
  if(tab==='preview'){buildPDF();window.scrollTo(0,0);}
}

function onDocTypeChange(){
  document.getElementById('advanceSection').style.display=val('docType')==='정산서'?'':'none';
  recalc();
}

function addItem(){
  items.push({id:Date.now()+'_'+Math.random(),name:'',brand:'',s1:'',s2:'165',s3:'1200',qty:'',mat:'',labor:''});
  renderItems();
}
function removeItem(id){items=items.filter(i=>i.id!==id);renderItems();}
function renderItems(){
  const tbody=document.getElementById('itemsBody');
  tbody.innerHTML='';
  items.forEach((it,idx)=>{
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td style="text-align:center;color:var(--muted);font-size:11px">${idx+1}</td>
      <td><div class="name-cell">
        <input value="${it.name||''}" placeholder="제품명" oninput="upd('${it.id}','name',this.value)">
        <input class="brand-inp" value="${it.brand||''}" placeholder="브랜드" oninput="upd('${it.id}','brand',this.value)">
      </div></td>
      <td><div class="spec-cell">
        <input class="spec-first" value="${it.s1||''}" placeholder="10" oninput="upd('${it.id}','s1',this.value)">
        <span class="spec-sep">×</span>
        <input type="number" value="${it.s2||'165'}" oninput="upd('${it.id}','s2',this.value)">
        <span class="spec-sep">×</span>
        <input type="number" value="${it.s3||'1200'}" oninput="upd('${it.id}','s3',this.value)">
      </div></td>
      <td><input type="number" class="num" value="${it.qty||''}" placeholder="0" oninput="upd('${it.id}','qty',this.value)"></td>
      <td><input type="number" class="num" value="${it.mat||''}" placeholder="0" oninput="upd('${it.id}','mat',this.value)"></td>
      <td><input type="number" class="num" value="${it.labor||''}" placeholder="0" oninput="upd('${it.id}','labor',this.value)"></td>
      <td class="amt-td" id="amt_${it.id}">${calcAmt(it)}</td>
      <td><button class="del-btn" onclick="removeItem('${it.id}')">✕</button></td>
    `;
    tbody.appendChild(tr);
  });
  recalc();
}
function upd(id,field,v){
  const it=items.find(i=>i.id===id);
  if(it){it[field]=v;const el=document.getElementById('amt_'+id);if(el)el.textContent=calcAmt(it);}
  recalc();
}
function calcAmt(it){
  const qty=parseFloat(it.qty)||0,mat=parseFloat(it.mat)||0,labor=parseFloat(it.labor)||0;
  if(!qty)return '—';
  return fmt(Math.round(qty*(mat+labor)))+'원';
}

function addExtra(){extras.push({id:Date.now()+'_e',name:'',amt:''});renderExtras();}
function removeExtra(id){extras=extras.filter(e=>e.id!==id);renderExtras();}
function renderExtras(){
  const el=document.getElementById('extraList');el.innerHTML='';
  extras.forEach(ex=>{
    const div=document.createElement('div');div.className='extra-row';
    div.innerHTML=`
      <input value="${ex.name||''}" placeholder="항목명 (예: 샌딩비)" oninput="updEx('${ex.id}','name',this.value)">
      <input type="number" class="ex-amt" value="${ex.amt||''}" placeholder="금액" oninput="updEx('${ex.id}','amt',this.value)">
      <button class="extra-del" onclick="removeExtra('${ex.id}')">✕</button>
    `;
    el.appendChild(div);
  });
  recalc();
}
function updEx(id,field,v){const ex=extras.find(e=>e.id===id);if(ex)ex[field]=v;recalc();}

function getTotals(){
  const matSum=items.reduce((s,it)=>s+Math.round((parseFloat(it.qty)||0)*(parseFloat(it.mat)||0)),0);
  const laborSum=items.reduce((s,it)=>s+Math.round((parseFloat(it.qty)||0)*(parseFloat(it.labor)||0)),0);
  const itemSum=matSum+laborSum;
  const extraSum=Math.round(extras.reduce((s,ex)=>s+(parseFloat(ex.amt)||0),0));
  const subtotal=itemSum+extraSum;
  const vat=Math.round(subtotal*0.1);
  const total=subtotal+vat;
  const advance=Math.round(num('advanceAmt'));
  return{matSum,laborSum,itemSum,extraSum,subtotal,vat,total,advance,remain:total-advance};
}

function recalc(){
  const{matSum,laborSum,itemSum,extraSum,subtotal,vat,total,advance,remain}=getTotals();
  const isSettle=val('docType')==='정산서';
  const deposit=document.getElementById('condDeposit').value;
  const matLabel=deposit==='자재비 선금 입금'
    ? `자재비 소계 <span style="font-size:11px;color:var(--gold);font-weight:600">(선금 기준)</span>`
    : '자재비 소계';
  let html=`
    <div class="total-row"><span class="total-label">${matLabel}</span><span class="total-value">${fmt(matSum)}원</span></div>
    <div class="total-row"><span class="total-label">시공비 소계</span><span class="total-value">${fmt(laborSum)}원</span></div>
    ${extraSum?`<div class="total-row"><span class="total-label">추가비용</span><span class="total-value">${fmt(extraSum)}원</span></div>`:''}
    <div class="total-row"><span class="total-label">세전 합계</span><span class="total-value">${fmt(subtotal)}원</span></div>
    <div class="total-row"><span class="total-label">부가세 (10%)</span><span class="total-value">${fmt(vat)}원</span></div>
    <div class="total-row main-total"><span class="total-label">세후 ${isSettle?'정산':'견적'}액</span><span class="total-value">${fmt(total)}원</span></div>`;
  if(isSettle){
    html+=`<div class="total-row"><span class="total-label">선금</span><span class="total-value">${fmt(advance)}원</span></div>`;
    html+=`<div class="total-row gold-row"><span class="total-label">잔금 (청구액)</span><span class="total-value">${fmt(remain)}원</span></div>`;
  }
  document.getElementById('totalsBox').innerHTML=html;
  // 한글금액 업데이트
  const hbox=document.getElementById('hangulBox');
  if(hbox){
    const ht=toHangul(total);
    hbox.querySelector('.hv').textContent=ht||'금액을 입력하면 자동으로 표시됩니다';
  }
}

function buildPDFHTML(){
  const isSettle=val('docType')==='정산서';
  const{matSum,laborSum,itemSum,extraSum,subtotal,vat,total,advance,remain}=getTotals();
  const deposit=document.getElementById('condDeposit').value;
  const days=document.getElementById('condDays').value;
  const noteText=(document.getElementById('noteText').value||'').trim();

  const{matSum,laborSum}=getTotals();
  const validItems=items.filter(it=>it.name||parseFloat(it.qty));
  let itemRows=validItems.map((it,i)=>{
    const qty=parseFloat(it.qty)||0,mat=parseFloat(it.mat)||0,labor=parseFloat(it.labor)||0;
    const amt=qty?Math.round(qty*(mat+labor)):0;
    const spec=[it.s1,it.s2,it.s3].filter(Boolean).join(' × ');
    return `<tr>
      <td class="c">${i+1}</td>
      <td>${it.name||''}${it.brand?'<span class="brand-txt">'+it.brand+'</span>':''}</td>
      <td class="c">${spec}</td>
      <td class="r">${qty||''}</td>
      <td class="r">${mat?fmt(mat):''}</td>
      <td class="r">${labor?fmt(labor):''}</td>
      <td class="amt-cell">${amt?fmt(amt)+'원':''}</td>
    </tr>`;
  }).join('');
  for(let i=validItems.length;i<5;i++)
    itemRows+=`<tr><td class="c" style="color:#ddd">${i+1}</td><td></td><td></td><td></td><td></td><td></td><td></td></tr>`;

  const extraRows=extras.filter(ex=>ex.name||parseFloat(ex.amt)).map(ex=>
    `<tr><td colspan="6" style="text-align:right;color:#8C7B6B">${ex.name||'추가비용'}</td><td class="amt-cell">${fmt(parseFloat(ex.amt)||0)}원</td></tr>`
  ).join('');

  const matLabel=deposit==='자재비 선금 입금'?'자재비 소계  ★ 선금 기준':'자재비 소계';
  let subRows=`
    <tr><td class="lbl" style="${deposit==='자재비 선금 입금'?'color:#C8922A;font-weight:700':''}">${matLabel}</td><td class="val" style="${deposit==='자재비 선금 입금'?'color:#C8922A;font-weight:700':''}">${fmt(matSum)}원</td></tr>
    <tr><td class="lbl">시공비 소계</td><td class="val">${fmt(laborSum)}원</td></tr>
    ${extraSum?`<tr><td class="lbl">추가비용</td><td class="val">${fmt(extraSum)}원</td></tr>`:''}
    <tr><td class="lbl">세전 합계</td><td class="val">${fmt(subtotal)}원</td></tr>
    <tr><td class="lbl">부가세 (10%)</td><td class="val">${fmt(vat)}원</td></tr>
    <tr class="grand"><td class="lbl" style="color:rgba(253,250,246,.8)">세후 ${isSettle?'정산':'견적'}액 합계</td><td class="val">${fmt(total)}원</td></tr>`;
  if(isSettle) subRows+=`
    <tr><td class="lbl">선  금</td><td class="val">${fmt(advance)}원</td></tr>
    <tr class="gold"><td class="lbl" style="color:rgba(200,146,42,.7)">잔  금 (청구액)</td><td class="val">${fmt(remain)}원</td></tr>`;

  return `<div class="pdf-wrap" id="pdfTarget">
    <div class="pdf-header">
      <img class="pdf-header-logo" src="${LOGO}" alt="로고">
      <div class="pdf-header-brand">
        <div class="bname">㈜ 호인</div>
        <div class="bsub">마루 전문 시공</div>
      </div>
      <div class="pdf-header-contacts">
        <span class="tel">031-758-1054</span>
        <span class="mobile">010-7199-7756</span>
      </div>
    </div>
    <div class="pdf-gold-bar"></div>
    <div class="pdf-doc-title">${val('docType')}</div>
    <table class="pdf-info-table">
      <tr><td class="lbl">수  신</td><td>${val('clientName')}</td><td class="lbl">날  짜</td><td>${val('docDate')}</td></tr>
      <tr><td class="lbl">참  조</td><td>${val('clientContact')}</td><td class="lbl">시공일</td><td>${val('workDate')}</td></tr>
      <tr><td class="lbl">현장명</td><td colspan="3">${val('site')}</td></tr>
    </table>
    <div class="pdf-total-hero">
      <div class="lbl">세후 ${isSettle?'정산':'견적'}액</div>
      <div class="val">₩${fmt(total)}</div>
    </div>
    <div class="pdf-hangul">한글금액 : ${toHangul(total)}</div>
    <table class="pdf-items">
      <thead><tr>
        <th style="width:5%">No.</th><th style="width:22%">품  명</th><th style="width:17%">규격(mm)</th>
        <th style="width:8%">수량(평)</th><th style="width:13%">자재비/평</th><th style="width:13%">시공비/평</th><th style="width:15%">금  액</th>
      </tr></thead>
      <tbody>${itemRows}${extraRows}</tbody>
    </table>
    <table class="pdf-subtotals">${subRows}</table>
    ${noteText?`<div class="pdf-note">${noteText}</div>`:''}
    <div class="pdf-cond-box">
      <div class="pdf-cond-header">결제 조건 및 계좌 안내</div>
      <div class="pdf-cond-row"><span class="cn">①</span>시공일 1주일 전 — ${deposit==='자재비 선금 입금'?`자재비 선금 입금 (${fmt(matSum)}원)`:deposit}</div>
      <div class="pdf-cond-row"><span class="cn">②</span>시공 완료 후 ${days}일 이내 — 잔금 전액 입금</div>
      <div class="pdf-cond-row"><span class="cn">★</span>입금계좌 : 국민은행 &nbsp; 758601-00-101548 &nbsp; (주)호인</div>
    </div>
    <div class="pdf-sign">
      <div class="pdf-sign-box">
        <div class="sign-title">견  적  인</div>
        <div class="sign-row"><span class="sk">상  호</span>㈜ 호인</div>
        <div class="sign-row"><span class="sk">사업자</span>873-86-04048</div>
        <div class="sign-row"><span class="sk">대  표</span>임 재 성</div>
        <div class="sign-row"><span class="sk">주  소</span>경기 성남시 수정구 대왕판교로 828 102호</div>
        <div class="sign-row"><span class="sk">연락처</span>031-758-1054 / 010-7199-7756</div>
      </div>
      <div class="pdf-sign-box">
        <div class="sign-title">발  주  처</div>
        <div class="sign-row"><span class="sk">상  호</span>${val('clientName')}</div>
        <div class="sign-row"><span class="sk">담  당</span>${val('clientContact')}</div>
        <div class="sign-row"><span class="sk">주  소</span>${val('site')}</div>
        <div class="sign-row"><span class="sk">서  명</span></div>
        <div style="margin-top:26px;border-top:0.5px solid #DDD0BC"></div>
      </div>
    </div>
  </div>`;
}

function buildPDF(){
  const html=buildPDFHTML();
  document.getElementById('pdfContent').innerHTML=html;
  document.getElementById('pdfView').innerHTML=html;
}

function saveImage(){
  buildPDF();
  const loading=document.getElementById('loading');
  loading.classList.add('show');
  setTimeout(()=>{
    const target=document.getElementById('pdfContent').querySelector('#pdfTarget');
    html2canvas(target,{scale:2,useCORS:true,backgroundColor:'#FDFAF6',logging:false})
    .then(canvas=>{
      loading.classList.remove('show');
      const link=document.createElement('a');
      const fname=(val('clientName')||'호인플로링')+'_'+val('docDate')+'_'+val('docType')+'.jpg';
      link.download=fname;
      link.href=canvas.toDataURL('image/jpeg',0.95);
      link.click();
      showToast('🖼 이미지 저장 완료!');
    }).catch(()=>{loading.classList.remove('show');showToast('⚠️ 잠시 후 다시 시도해 주세요');});
  },500);
}

function printPDF(){
  buildPDF();
  setTimeout(()=>{window.print();showToast('📄 PDF 저장 완료!');},200);
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

addItem();
recalc();
</script>
