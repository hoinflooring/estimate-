<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#2C4A43">
<title>호인플로링 견적서</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F4F2EE;--surface:#FFFFFF;--border:#DDD9D0;
  --accent:#2C4A43;--accent2:#3D6B5E;--accent-lt:#EAF2EF;
  --gold:#B8963E;--text:#1E1E1C;--muted:#888884;--danger:#C0392B;--radius:10px;
}
body{background:var(--bg);font-family:'Apple SD Gothic Neo',Arial,sans-serif;color:var(--text);font-size:14px;line-height:1.5}
.app-header{background:var(--accent);padding:12px 18px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.header-logo{width:44px;height:44px;object-fit:contain;flex-shrink:0}
.header-info{flex:1}
.brand-name{font-size:18px;font-weight:700;color:#fff;letter-spacing:-0.3px;line-height:1.1}
.brand-sub{font-size:11px;color:#AAD4C8;margin-top:1px}
.header-tel{font-size:13px;color:var(--gold);font-weight:600;white-space:nowrap}
.tab-bar{display:flex;background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px}
.tab-btn{flex:1;padding:12px 0;font-size:14px;font-weight:600;background:none;border:none;border-bottom:3px solid transparent;color:var(--muted);cursor:pointer;transition:all .2s}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.content{padding:16px;max-width:640px;margin:0 auto}
.section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px}
.section-label{font-size:11px;font-weight:700;color:var(--accent2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--accent-lt)}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;color:var(--muted);font-weight:600;margin-bottom:4px}
.field input,.field select{width:100%;border:1px solid var(--border);border-radius:7px;padding:9px 12px;font-size:14px;color:var(--text);background:var(--surface);outline:none;transition:border-color .15s;font-family:inherit}
.field input:focus,.field select:focus{border-color:var(--accent2);box-shadow:0 0 0 3px rgba(61,107,94,.1)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.items-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.items-table{width:100%;border-collapse:collapse;min-width:500px}
.items-table th{background:var(--accent);color:#fff;font-size:11px;font-weight:600;padding:8px 6px;text-align:center;white-space:nowrap}
.items-table th:first-child{border-radius:6px 0 0 0}
.items-table th:last-child{border-radius:0 6px 0 0}
.items-table td{border-bottom:1px solid var(--border);padding:4px 3px;vertical-align:middle}
.items-table tr:nth-child(even) td{background:#FAFAF8}
.items-table input{border:none;background:transparent;width:100%;font-size:13px;padding:5px 6px;color:var(--text);text-align:inherit;font-family:inherit;outline:none;border-radius:5px}
.items-table input:focus{background:var(--accent-lt)}
.items-table .num{text-align:right}
.items-table .amt{font-weight:700;color:var(--accent);text-align:right;font-size:13px;padding:0 8px;white-space:nowrap}
.items-table .del-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:4px 8px;border-radius:4px}
.items-table .del-btn:hover{color:var(--danger);background:#FEF0EE}
.add-item-btn{width:100%;margin-top:10px;padding:9px;border:1.5px dashed var(--border);border-radius:7px;background:none;color:var(--muted);font-size:13px;cursor:pointer;font-family:inherit;transition:.15s}
.add-item-btn:hover{border-color:var(--accent2);color:var(--accent2);background:var(--accent-lt)}
.extra-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.extra-row input{flex:1;border:1px solid var(--border);border-radius:7px;padding:8px 10px;font-size:13px;font-family:inherit;outline:none}
.extra-row input:focus{border-color:var(--accent2)}
.extra-row .ex-amt{width:110px;text-align:right}
.extra-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;padding:4px 6px}
.add-extra-btn{font-size:12px;color:var(--accent2);background:none;border:none;cursor:pointer;padding:2px 0;font-family:inherit}
.totals{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:14px}
.total-row{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:1px solid var(--border)}
.total-row:last-child{border-bottom:none}
.total-row.main-total{background:var(--accent)}
.total-row.gold-row{background:#3D2B00}
.total-label{font-size:13px;color:var(--muted)}
.total-row.main-total .total-label,.total-row.gold-row .total-label{color:rgba(255,255,255,.7);font-weight:600}
.total-value{font-size:15px;font-weight:700;color:var(--text)}
.total-row.main-total .total-value{color:#fff;font-size:18px}
.total-row.gold-row .total-value{color:var(--gold);font-size:18px}
.cond-list{list-style:none}
.cond-list li{font-size:13px;color:var(--muted);padding:5px 0;border-bottom:1px solid var(--accent-lt);display:flex;gap:8px}
.cond-list li:last-child{border-bottom:none;color:var(--accent);font-weight:700;font-size:14px}
.cond-num{color:var(--accent2);font-weight:700;min-width:14px}
.dl-btn{width:100%;padding:16px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit;transition:.15s;margin-bottom:20px}
.dl-btn:hover{background:#243D37}
.dl-btn:active{transform:scale(.98)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--accent);color:#fff;padding:12px 24px;border-radius:30px;font-size:14px;font-weight:600;pointer-events:none;transition:transform .3s ease;z-index:999}
.toast.show{transform:translateX(-50%) translateY(0)}
.preview-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:14px}
.preview-header{border-bottom:3px solid var(--gold);padding-bottom:12px;margin-bottom:16px;display:flex;align-items:center;gap:12px}
.preview-header-logo{width:36px;height:36px;object-fit:contain}
.preview-title{font-size:20px;font-weight:800;color:var(--accent);letter-spacing:-1px}
.preview-sub{font-size:11px;color:var(--muted);margin-top:1px}
.preview-doc-type{margin-left:auto;font-size:22px;font-weight:900;color:var(--accent)}
.preview-info-grid{display:grid;grid-template-columns:auto 1fr;gap:4px 12px;font-size:13px;margin-bottom:16px}
.preview-info-grid dt{color:var(--muted);font-weight:600;white-space:nowrap}
.preview-items{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:16px}
.preview-items th{background:var(--accent);color:#fff;padding:6px 8px;text-align:center}
.preview-items td{border:1px solid var(--border);padding:5px 8px}
.preview-items .r{text-align:right}
.preview-total-box{background:var(--accent);color:#fff;border-radius:8px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center}
.preview-total-box .lbl{font-size:12px;opacity:.8}
.preview-total-box .amt{font-size:20px;font-weight:800}
</style>
</head>

<script>
let items=[],extras=[];
function fmt(n){return Math.round(n||0).toLocaleString('ko-KR');}
function num(id){return parseFloat(document.getElementById(id)?.value||0)||0;}
function val(id){return(document.getElementById(id)?.value||'').trim();}
(function(){
  const t=new Date().toISOString().split('T')[0];
  document.getElementById('docDate').value=t;
  const w=new Date();w.setDate(w.getDate()+7);
  document.getElementById('workDate').value=w.toISOString().split('T')[0];
})();
function switchTab(tab){
  document.getElementById('tab-input').style.display=tab==='input'?'':'none';
  document.getElementById('tab-preview').style.display=tab==='preview'?'':'none';
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    b.classList.toggle('active',(i===0&&tab==='input')||(i===1&&tab==='preview'));
  });
  if(tab==='preview')renderPreview();
}
function onDocTypeChange(){
  document.getElementById('advanceSection').style.display=val('docType')==='정산서'?'':'none';
  recalc();
}
function addItem(name='',spec='',qty='',mat='',labor=''){
  const id=Date.now()+'_'+Math.random();
  items.push({id,name,spec,qty,mat,labor});renderItems();
}
function removeItem(id){items=items.filter(i=>i.id!==id);renderItems();}
function renderItems(){
  const tbody=document.getElementById('itemsBody');
  tbody.innerHTML='';
  items.forEach((it,idx)=>{
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td style="text-align:center;color:var(--muted);font-size:12px">${idx+1}</td>
      <td><input value="${it.name||''}" placeholder="품명" oninput="updateItem('${it.id}','name',this.value)"></td>
      <td><input value="${it.spec||''}" placeholder="10×165×1200" oninput="updateItem('${it.id}','spec',this.value)"></td>
      <td><input type="number" class="num" value="${it.qty||''}" placeholder="0" oninput="updateItem('${it.id}','qty',this.value)"></td>
      <td><input type="number" class="num" value="${it.mat||''}" placeholder="0" oninput="updateItem('${it.id}','mat',this.value)"></td>
      <td><input type="number" class="num" value="${it.labor||''}" placeholder="0" oninput="updateItem('${it.id}','labor',this.value)"></td>
      <td class="amt" id="amt_${it.id}">${calcItemAmt(it)}</td>
      <td><button class="del-btn" onclick="removeItem('${it.id}')">✕</button></td>
    `;
    tbody.appendChild(tr);
  });
  recalc();
}
function updateItem(id,field,v){
  const it=items.find(i=>i.id===id);
  if(it){it[field]=v;document.getElementById('amt_'+id).textContent=calcItemAmt(it);}
  recalc();
}
function calcItemAmt(it){
  const qty=parseFloat(it.qty)||0,mat=parseFloat(it.mat)||0,labor=parseFloat(it.labor)||0;
  if(!qty)return '—';
  return fmt(Math.round(qty*(mat+labor)))+'원';
}
function addExtra(name='',amt=''){
  const id=Date.now()+'_e';
  extras.push({id,name,amt});renderExtras();
}
function removeExtra(id){extras=extras.filter(e=>e.id!==id);renderExtras();}
function renderExtras(){
  const el=document.getElementById('extraList');
  el.innerHTML='';
  extras.forEach(ex=>{
    const div=document.createElement('div');
    div.className='extra-row';
    div.innerHTML=`
      <input value="${ex.name||''}" placeholder="항목명 (예: 샌딩비)" oninput="updateExtra('${ex.id}','name',this.value)">
      <input type="number" class="ex-amt" value="${ex.amt||''}" placeholder="금액" oninput="updateExtra('${ex.id}','amt',this.value)">
      <button class="extra-del" onclick="removeExtra('${ex.id}')">✕</button>
    `;
    el.appendChild(div);
  });
  recalc();
}
function updateExtra(id,field,v){
  const ex=extras.find(e=>e.id===id);
  if(ex)ex[field]=v;recalc();
}
function getTotals(){
  const itemSum=items.reduce((s,it)=>s+Math.round((parseFloat(it.qty)||0)*((parseFloat(it.mat)||0)+(parseFloat(it.labor)||0))),0);
  const extraSum=extras.reduce((s,ex)=>s+(parseFloat(ex.amt)||0),0);
  const subtotal=Math.round(itemSum+extraSum);
  const vat=Math.round(subtotal*0.1);
  const total=subtotal+vat;
  const advance=Math.round(num('advanceAmt'));
  return{itemSum,extraSum,subtotal,vat,total,advance,remain:total-advance};
}
function recalc(){
  const{itemSum,extraSum,subtotal,vat,total,advance,remain}=getTotals();
  const isSettle=val('docType')==='정산서';
  let html=`
    <div class="total-row"><span class="total-label">품목 소계</span><span class="total-value">${fmt(itemSum)}원</span></div>
    <div class="total-row"><span class="total-label">추가비용</span><span class="total-value">${fmt(extraSum)}원</span></div>
    <div class="total-row"><span class="total-label">세전 합계</span><span class="total-value">${fmt(subtotal)}원</span></div>
    <div class="total-row"><span class="total-label">부가세 (10%)</span><span class="total-value">${fmt(vat)}원</span></div>
    <div class="total-row main-total"><span class="total-label">세후 ${isSettle?'정산':'견적'}액</span><span class="total-value">${fmt(total)}원</span></div>
  `;
  if(isSettle){
    html+=`<div class="total-row"><span class="total-label">선금</span><span class="total-value">${fmt(advance)}원</span></div>`;
    html+=`<div class="total-row gold-row"><span class="total-label">잔금 (청구액)</span><span class="total-value">${fmt(remain)}원</span></div>`;
  }
  document.getElementById('totalsBox').innerHTML=html;
}

      <dt>현장</dt><dd>${val('site')||'—'}</dd>
      <dt>작성일</dt><dd>${val('docDate')||'—'}</dd>
      <dt>시공일</dt><dd>${val('workDate')||'—'}</dd>
    </dl>
    <table class="preview-items">
      <tr><th>#</th><th>품명</th><th>규격</th><th>수량</th><th>자재비</th><th>시공비</th><th>금액</th></tr>
      ${rows}
    </table>
    <div style="font-size:12px;color:var(--muted);margin-bottom:12px">* 물량은 로스율 포함 / 자재비에는 본드 포함</div>
    <div style="display:grid;gap:5px;margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;font-size:13px"><span style="color:var(--muted)">세전 합계</span><span>${fmt(subtotal)}원</span></div>
      <div style="display:flex;justify-content:space-between;font-size:13px"><span style="color:var(--muted)">부가세 10%</span><span>${fmt(vat)}원</span></div>
      ${isSettle?`<div style="display:flex;justify-content:space-between;font-size:13px"><span style="color:var(--muted)">선금</span><span>${fmt(advance)}원</span></div>`:''}
    </div>
    <div class="preview-total-box"><span class="lbl">세후 ${isSettle?'정산':'견적'}액 합계</span><span class="amt">${fmt(total)}원</span></div>
    ${isSettle?`<div style="margin-top:8px;background:#3D2B00;border-radius:8px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center"><span style="color:rgba(255,255,255,.7);font-size:13px">잔금 (청구액)</span><span style="color:var(--gold);font-size:18px;font-weight:800">${fmt(remain)}원</span></div>`:''}
  `;
}
function downloadExcel(){
  const isSettle=val('docType')==='정산서';
  const{subtotal,vat,total,advance,remain}=getTotals();
  const wb=XLSX.utils.book_new();
  const docType=val('docType');
  const aoa=[];
  const push=(...row)=>aoa.push(row);
  push(['']);
  push(['㈜ 호인','','','마루 전문 시공','','031-758-1054']);
  push(['']);
  push([docType]);
  push(['']);
  push(['수  신',val('clientName')||'','','날  짜',val('docDate')]);
  push(['참  조',val('clientContact')||'','','시공일',val('workDate')]);
  push(['현장명 (주소)',val('site')||'','','','']);
  push(['']);
  push(['세후 '+(isSettle?'정산':'견적')+'액','','',total,'','','']);
  push(['한글금액','','','※ 한글 금액을 직접 입력해 주세요','','','']);
  push(['']);
  push(['No.','품  명','규  격 (mm)','수량(평)','자재비/평','시공비/평','금  액']);
  items.forEach((it,i)=>{
    const qty=parseFloat(it.qty)||0,mat=parseFloat(it.mat)||0,labor=parseFloat(it.labor)||0;
    push([i+1,it.name||'',it.spec||'',qty||'',mat||'',labor||'',qty?Math.round(qty*(mat+labor)):'']);
  });
  if(!items.length)push([1,'','','','','','']);
  push(['소  계','','','','','',Math.round(items.reduce((s,it)=>s+Math.round((parseFloat(it.qty)||0)*((parseFloat(it.mat)||0)+(parseFloat(it.labor)||0))),0))]);
  extras.forEach(ex=>push([ex.name||'추가비용','','','','','',Math.round(parseFloat(ex.amt)||0)]));
  push(['세전 합계','','','','','',subtotal]);
  push(['부가세 (10%)','','','','','',vat]);
  push(['세후 '+(isSettle?'정산':'견적')+'액 합계','','','','','',total]);
  if(isSettle){push(['선  금','','','','','',advance]);push(['잔  금 (청구액)','','','','','',remain]);}
  push(['']);
  push(['비  고','* 물량은 로스율 포함 / 자재비에는 본드 포함']);
  push(['']);
  push(['결제 조건']);
  push(['','① 시공일 1주일 전 — 자재비 선금 입금']);
  push(['','② 시공 완료 후 7일 이내 — 잔금 전액 입금']);
  push(['','★ 입금계좌: 국민은행 758601-00-101548 (주)호인']);
  push(['']);
  push(['견  적  인','㈜ 호인','','발  주  처',val('clientName')||'']);
  push(['','사업자: 873-86-04048','','','']);
  push(['','대표: 임 재 성','','담당: '+(val('clientContact')||''),'']);
  push(['','경기 성남시 수정구 대왕판교로 828 102호','','','']);
  push(['','T. 031-758-1054','','','']);
  const ws=XLSX.utils.aoa_to_sheet(aoa);
  ws['!cols']=[{wch:16},{wch:20},{wch:16},{wch:10},{wch:12},{wch:12},{wch:14}];
  const M=(r1,c1,r2,c2)=>({s:{r:r1,c:c1},e:{r:r2,c:c2}});
  ws['!merges']=[M(1,0,1,2),M(1,3,1,4),M(3,0,3,6),M(5,1,5,2),M(6,1,6,2),M(7,1,7,6),M(9,0,9,2),M(9,3,9,6),M(10,0,10,2),M(10,3,10,6)];
  const range=XLSX.utils.decode_range(ws['!ref']||'A1:G50');
  for(let r=range.s.r;r<=range.e.r;r++){
    const a=XLSX.utils.encode_cell({r,c:6});
    if(ws[a]&&typeof ws[a].v==='number')ws[a].z='#,##0';
    const a2=XLSX.utils.encode_cell({r,c:3});
    if(ws[a2]&&typeof ws[a2].v==='number')ws[a2].z='#,##0';
  }
  XLSX.utils.book_append_sheet(wb,ws,docType);
  const fname=`${val('clientName')||'호인플로링'}_${val('docDate')||'견적'}_${docType}.xlsx`;
  XLSX.writeFile(wb,fname);
  const t=document.getElementById('toast');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
addItem('','','','','');
